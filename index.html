<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Invoice Merge Tool</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>📄 Invoice Merge Tool</h1>
        <p>
            Merge Invoice PDF + Tax Invoice + PO + Screenshot automatically.
        </p>
    </header>

    <!-- STEP 1 -->
    <section class="card">

        <h2>Step 1</h2>

        <label for="excelFile">
            Upload Mapping Excel
        </label>

        <input
            type="file"
            id="excelFile"
            accept=".xlsx,.xls">

        <div id="excelInfo" class="info">
            No Excel selected
        </div>

    </section>

    <!-- STEP 2 -->
    <section class="card">

        <h2>Step 2</h2>

        <button id="pickFolderBtn">
            📁 Select Documents Folder
        </button>

        <div id="folderInfo" class="info">
            No folder selected
        </div>

    </section>

    <!-- STEP 3 -->
    <section class="card">

        <h2>Step 3</h2>

        <button
            id="startMergeBtn"
            disabled>

            Merge Documents

        </button>

    </section>

    <!-- Progress -->

    <section class="card">

        <h2>Progress</h2>

        <progress
            id="progressBar"
            value="0"
            max="100">
        </progress>

        <div id="progressText">

            Waiting...

        </div>

    </section>

    <!-- Log -->

    <section class="card">

        <h2>Log</h2>

        <div id="log">

            Application started.

        </div>

    </section>

</div>

<!-- Libraries -->

<script src="libs/xlsx.full.min.js"></script>
<script src="libs/pdf-lib.min.js"></script>
<script src="libs/jszip.min.js"></script>
<script src="libs/FileSaver.min.js"></script>

<!-- Main Application -->

<script src="app.js"></script>

</body>
</html>
